<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="44" fill="#0b0b0e"/>
  <!-- Subtle glow behind the P -->
  <circle cx="90" cy="90" r="50" fill="url(#glow-grad)" opacity="0.15" filter="url(#blur)"/>
  
  <!-- Stylized Monogram P with network nodes -->
  <g transform="translate(10, 0)">
    <!-- Stem and Loop of P -->
    <path d="M65 45 v90 M65 45 h30 a25 25 0 0 1 0 50 H65" 
          stroke="url(#logo-grad)" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none" />
    
    <!-- Network Nodes (Circles representing data points/neurons) -->
    <circle cx="65" cy="45" r="7" fill="#ffffff" />
    <circle cx="65" cy="95" r="7" fill="#ffffff" />
    <circle cx="65" cy="135" r="7" fill="#ffffff" />
    <circle cx="95" cy="45" r="7" fill="#ffffff" />
    <circle cx="120" cy="70" r="7" fill="#ffffff" />
    <circle cx="95" cy="95" r="7" fill="#ffffff" />
    
    <!-- Connection line representing neural network path -->
    <path d="M120 70 L145 95" stroke="#9333ea" stroke-width="4" stroke-dasharray="4 4" opacity="0.6"/>
    <circle cx="145" cy="95" r="5" fill="#3b82f6" />
  </g>

  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <linearGradient id="logo-grad" x1="50" y1="40" x2="150" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" /> <!-- Purple -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Blue -->
    </linearGradient>
    <linearGradient id="glow-grad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
</svg>